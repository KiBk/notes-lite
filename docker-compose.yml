version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=notes
      - POSTGRES_USER=notes
      - POSTGRES_PASSWORD=notes
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d notes -U notes"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DATABASE_URL=postgres://notes:notes@db:5432/notes
      - ENABLE_DEV_LOGIN=${ENABLE_DEV_LOGIN:-true}
      - DEV_AUTO_LOGIN_USERNAME=${DEV_AUTO_LOGIN_USERNAME:-}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_CALLBACK_URL=${OIDC_CALLBACK_URL:-http://localhost:5000/api/auth/oidc/callback}
      - OIDC_SCOPE=${OIDC_SCOPE:-openid profile email}
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db-data:
